server:
  # A interface web nao tem autenticacao: so deve ser alcancavel pelo proprio
  # PC. Sem isso, o Spring Boot escuta em 0.0.0.0 e qualquer dispositivo na
  # mesma rede Wi-Fi/LAN pode acionar traducao, remux, limpeza de cache e
  # leitura do codigo-fonte (endpoint /api/mapa) sem nenhuma credencial.
  address: 127.0.0.1
  port: 8080

spring:
  config:
    import: "optional:classpath:application-local.yml"
  output:
    ansi:
      enabled: ALWAYS
  threads:
    virtual:
      enabled: true
  main:
    # Esta aplicacao e uma CLI local; por padrao (sem argumentos), o
    # Application.main agora sobe em modo WEB (servlet) para servir a
    # interface web em src/main/resources/static. Quando rodada com
    # --tradutor.diretorio-entrada=<algo>, cai de volta ao modo CLI puro e
    # nenhum servidor HTTP e levantado.
    web-application-type: none

tradutor:
  # Pasta com os arquivos .ass/.ssa em ingles a serem traduzidos.
  # Se vazia, o programa pede o caminho no console ao iniciar.
  # Tambem pode ser sobrescrita via: --tradutor.diretorio-entrada=<caminho>
  diretorio-entrada: ""
  # Se vazia, e calculada a partir de diretorio-entrada (troca "eng" por "pt-br").
  diretorio-saida: ""
  # Se vazia (padrao), nao e mais perguntada no console: cai em
  # cache/<pasta-do-anime>/<subpasta>, na raiz do projeto, derivada de
  # diretorio-entrada. So precisa ser preenchida para forcar outro local.
  diretorio-cache: ""
  # Quantidade de falas por requisicao ao LLM. Modificado para 1 (linha a linha) para evitar falhas e alucinações.
  tamanho-lote: 1
  # Estilos ASS que nao devem ser traduzidos (ex: letra original em romaji
  # usada para karaoke, que deve permanecer no idioma original).
  estilos-ignorados:
    - "Song JP"
    - "Mobile Suit Gundam"
    - "Char's Counterattack"
    - "OP - Romaji"
    - "OP - English"
    - "ED - Romaji"
    - "ED - English"
    - "ED-ROM"
  # Chaves de idioma gravadas no cache JSON (par original -> traduzido).
  idioma-original: "en"
  idioma-traduzido: "pt-br"
  llm:
    base-url: "http://127.0.0.1:1234/v1"
    # Precisa bater com o "id" do modelo carregado no LM Studio
    # (GET /v1/models). Para o Mistral Nemo costuma ser algo como
    # "mistralai/mistral-nemo-instruct-2407", nao apenas "mistral-nemo".
    model: "mistralai/mistral-nemo-instruct-2407"
    temperature: 0.3
    max-tokens: 2000
    connect-timeout: 5s
    read-timeout: 180s

remuxer:
  # Caminho para o executavel do mkvmerge (se vazio, tenta achar no PATH ou pasta padrao do Windows)
  mkvmerge-path: ""

extrator:
  # Caminhos para mkvmerge/mkvextract (MKV/WebM) e ffmpeg/ffprobe (MP4/MOV/AVI/TS/M2TS/FLV/WMV).
  # Se vazios, tenta achar no PATH ou pasta padrao do Windows (so para MKVToolNix).
  mkvmerge-path: ""
  mkvextract-path: ""
  ffmpeg-path: ""
  ffprobe-path: ""

tmdb:
  # Chave de API do TMDB para busca de capas e metadados nativos em PT-BR
  api-key: "${TMDB_API_KEY:}"



logging:
  charset:
    console: UTF-8
    file: UTF-8
  level:
    root: INFO
    org.traducao.projeto.traducao: INFO
  pattern:
    console: "%clr(%d{HH:mm:ss}){faint} %clr(%-5level) %clr([%thread]){magenta} %clr(%logger{20}){cyan} %clr(-){faint} %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] loteId=%X{loteId} %logger{36} - %msg%n"
  file:
    name: logs/tradutor.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 5
